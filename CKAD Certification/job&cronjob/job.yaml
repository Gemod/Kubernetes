apiVersion: batch/v1
kind: Job
metadata:
  name: hello-job
spec:
  completions: 1          # quante volte deve completarsi
  parallelism: 1          # quanti Pod girano in parallelo
  backoffLimit: 3         # quanti retry in caso di errore
  activeDeadlineSeconds: 120 # il Job ha massimo 2 minuti per completarsi terminati i
   #quali k8s lo termina forzatamente insieme a tutti i pod che ha creato!
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: hello
        image: busybox
        command: ['sh', '-c', 'echo "Sono le: $(date)"']